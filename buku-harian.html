<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F2744">
<title>Buku Harian — BEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/shared.css">
</head>
<body>
<script>
  window.BEN_MODULE = 'buku_harian';
  window.BEN_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykXCG6hxn8xdQuv2BKAujYT5XGSCjTmJmxMLS1T3SeFqVAF3LK3G9Fxev-14rLw9WL/exec';
</script>

<div class="app-header h-blue">
  <div class="header-icon">📓</div>
  <div class="header-text">
    <div class="header-sub">Program BEN — Manggarai</div>
    <div class="header-title">Buku Harian Anak</div>
  </div>
  <div class="header-badge" id="queueBadge" onclick="openQueueModal()">
    <span class="dot"></span><span id="queueCount">0</span> antrian
  </div>
</div>
<div class="status-pill">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Memeriksa koneksi…</span>
</div>

<div class="main">

  <!-- IDENTITAS -->
  <div class="s-card">
    <div class="s-header open" id="shdr-s1" onclick="toggleSection('s1')">
      <div class="s-step blue">1</div>
      <div class="s-info"><div class="s-title">Benef / Dampingan</div><div class="s-sub">Identitas</div></div>
      <svg class="s-chevron open" id="schev-s1" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="s-body open" id="sbody-s1">
      <div class="field">
        <label class="field-label">CBR Worker <span class="req">*</span></label>
        <select id="cbrWorker" onchange="onWorkerChange()"></select>
      </div>
      <div class="field">
        <label class="field-label">Nama Anak <span class="req">*</span></label>
        <select id="namaAnak" disabled><option value="">— Pilih CBR Worker dulu —</option></select>
      </div>
    </div>
  </div>

  <!-- CATATAN HARIAN -->
  <div class="s-card">
    <div class="s-header" id="shdr-s2" onclick="toggleSection('s2')">
      <div class="s-step blue">2</div>
      <div class="s-info"><div class="s-title">Catatan Harian</div><div class="s-sub" id="diaryCountLabel">2 catatan</div></div>
      <svg class="s-chevron" id="schev-s2" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="s-body" id="sbody-s2">
      <div id="diaryList"></div>
      <button class="btn-add blue" onclick="addDiary()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah Catatan Harian
      </button>
    </div>
  </div>

  <div class="progress-wrap" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="action-bar">
    <button class="btn btn-secondary" onclick="handleDraft()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Simpan Draft
    </button>
    <button class="btn btn-primary" id="btnSubmit" onclick="handleSubmit()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Kirim ke Server
    </button>
  </div>
  <div class="action-bar" style="margin-bottom:0;">
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">🏠 Kembali ke Menu</button>
    <button class="btn btn-danger" onclick="confirmReset()">↺ Reset</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="queueModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Antrian Pengiriman</div>
    <div id="queueList"></div>
    <button class="btn btn-primary" style="margin-top:16px;" onclick="submitAllQueue()">Kirim Semua Sekarang</button>
  </div>
</div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title">Reset Form?</div>
    <div class="confirm-desc">Data yang belum tersimpan akan hilang.</div>
    <div class="confirm-btns">
      <button class="btn-cancel-c" onclick="closeConfirm()">Batal</button>
      <button class="btn-do-reset" onclick="doReset()">Ya, Reset</button>
    </div>
  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/shared.js"></script>
<script>
let diaryIds=[], diaryCount=0;
const GUIDE='<strong>Panduan:</strong> Hal menonjol (baik & tantangan) · 5W1H · Aktivitas di rumah · Perjanjian dengan petugas RBM · Pertanyaan untuk kunjungan berikutnya';

document.addEventListener('DOMContentLoaded',()=>{
  initChildrenData(()=>{
    populateWorkerSelect(document.getElementById('cbrWorker'));
    const d=loadDraft();
    if(d){restoreForm(d);showToast('Draft sebelumnya dimuat','t-warning');}
  });
  if(!diaryIds.length){addDiary();addDiary();}
  updateStatusBar();updateQueueBadge();
});

function onWorkerChange(){populateChildSelect(document.getElementById('cbrWorker').value,document.getElementById('namaAnak'));}

function addDiary(data){
  diaryCount++;
  const id='dr_'+Date.now()+'_'+diaryCount;
  diaryIds.push(id);
  const n=diaryIds.length;
  const block=document.createElement('div');
  block.className='diary-block';block.id='dblock_'+id;
  block.innerHTML=`
    <div class="diary-block-hdr" onclick="toggleDiary('${id}')">
      <div class="diary-num">${n}</div>
      <div class="diary-title">Catatan Harian ${n}</div>
      <button class="diary-remove" onclick="removeDiary('${id}',event)">✕</button>
      <svg class="diary-chev open" id="dchev_${id}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="diary-body open" id="dbody_${id}">
      <div class="info-box blue" style="margin-bottom:12px;">${GUIDE}</div>
      <div class="field"><label class="field-label">Tanggal</label><input type="date" id="dtgl_${id}"></div>
      <div class="field"><label class="field-label">Catatan</label><textarea id="disi_${id}" rows="5" placeholder="Tuliskan catatan di sini…"></textarea></div>
    </div>`;
  document.getElementById('diaryList').appendChild(block);
  if(data){if(data.tanggal)document.getElementById('dtgl_'+id).value=data.tanggal;if(data.isi)document.getElementById('disi_'+id).value=data.isi;}
  updateDiaryLabel();
}
function removeDiary(id,e){
  e.stopPropagation();
  if(diaryIds.length<=1){showToast('Minimal 1 catatan harus ada','t-error');return;}
  document.getElementById('dblock_'+id)?.remove();
  diaryIds=diaryIds.filter(x=>x!==id);
  renumberDiary();
}
function renumberDiary(){
  diaryIds.forEach((id,i)=>{
    const n=i+1;
    const el=document.querySelector('#dblock_'+id+' .diary-num');if(el)el.textContent=n;
    const tl=document.querySelector('#dblock_'+id+' .diary-title');if(tl)tl.textContent='Catatan Harian '+n;
  });
  updateDiaryLabel();
}
function updateDiaryLabel(){document.getElementById('diaryCountLabel').textContent=diaryIds.length+' catatan';}
function toggleDiary(id){const b=document.getElementById('dbody_'+id),c=document.getElementById('dchev_'+id);const o=b.classList.toggle('open');c.classList.toggle('open',o);}

function collect(){
  const w=document.getElementById('cbrWorker'),a=document.getElementById('namaAnak');
  return {
    timestamp:new Date().toISOString(),modul:'buku_harian',
    cbrWorkerValue:w.value,cbrWorkerLabel:w.options[w.selectedIndex]?.text||'',
    namaAnakValue:a.value,namaAnakLabel:a.options[a.selectedIndex]?.text||'',
    tanggal:diaryIds[0]?document.getElementById('dtgl_'+diaryIds[0])?.value||'':'',
    diaries:diaryIds.map((id,i)=>({nomor:i+1,tanggal:document.getElementById('dtgl_'+id)?.value||'',isi:(document.getElementById('disi_'+id)?.value||'').trim()}))
  };
}
function validate(d){
  if(!d.cbrWorkerValue) return 'CBR Worker belum dipilih.';
  if(!d.namaAnakValue)  return 'Nama Anak belum dipilih.';
  if(!d.diaries.some(x=>x.isi)) return 'Minimal 1 catatan harus diisi.';
  return null;
}
function restoreForm(d){
  if(!d)return;
  const w=document.getElementById('cbrWorker'),a=document.getElementById('namaAnak');
  if(d.cbrWorkerValue){w.value=d.cbrWorkerValue;populateChildSelect(d.cbrWorkerValue,a);setTimeout(()=>{if(d.namaAnakValue)a.value=d.namaAnakValue;},50);}
  if(d.diaries&&d.diaries.length>0){document.getElementById('diaryList').innerHTML='';diaryIds=[];diaryCount=0;d.diaries.forEach(di=>addDiary(di));}
}
function handleDraft(){const d=collect(),e=validate(d);if(e){showToast('⚠️ '+e,'t-error');return;}saveDraft(d);showToast('Draft tersimpan','t-success');}
function handleSubmit(){const d=collect(),e=validate(d);if(e){showToast('⚠️ '+e,'t-error');return;}doSubmit(d,doReset);}
function doReset(){
  closeConfirm();clearDraft();
  document.getElementById('cbrWorker').value='';
  const a=document.getElementById('namaAnak');a.innerHTML='<option value="">— Pilih CBR Worker dulu —</option>';a.disabled=true;
  document.getElementById('diaryList').innerHTML='';diaryIds=[];diaryCount=0;addDiary();addDiary();
  window.scrollTo(0,0);showToast('Form dikosongkan','');
}
</script>
<script>window.BEN_ACTIVE_NAV='nav-harian';</script>
<script src="assets/js/nav.js"></script>
</body>
</html>
